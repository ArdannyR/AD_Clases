<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editar selección</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="hero small">
    <div>
      <p class="eyebrow">Aplicaciones Distribuidas - Semana 13</p>
      <h1>Actualizar selección</h1>
    </div>
  </header>
  <main class="container narrow">
    <section class="card">
      <form class="grid-form single" method="post">
        <label>Nombre
          <input name="nombre" required value="{{ seleccion['nombre'] }}">
        </label>
        <label>Continente / confederación
          <input name="continente" value="{{ seleccion['continente'] }}">
        </label>
        <label>Grupo
          <input name="grupo" value="{{ seleccion['grupo'] }}">
        </label>
        <div class="actions">
          <button type="submit">Guardar cambios</button>
          <a class="secondary" href="{{ url_for('inicio') }}">Cancelar</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
