version: '3'

services:

  mysql_principal:
    container_name: Maestro
    image: mysql:8.0
    ports:
      - "3306:3306"
    command: --server-id=1 --log-bin=mysql-bin --binlog-do-db=replica --binlog-ignore-db=mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: replica
    volumes:
      - master_data:/var/lib/mysql

  mysql_secundario:
    container_name: Esclavo
    image: mysql:8.0
    ports:
      - "3307:3306"
    command: --server-id=2 --log-bin=mysql-bin --binlog-do-db=replica --binlog-ignore-db=mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: replica
    volumes:
      - slave_data:/var/lib/mysql

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOSTS: "mysql_principal,mysql_secundario"
      PMA_ARBITRARY: 1

  nodo1:
    build:
      context: ./formulario
      dockerfile: Dockerfile
    container_name: Nodo1
    environment:
      - DB_HOST=mysql_principal
    ports:
      - "5001:5000"

  nodo2:
    build:
      context: ./formulario
      dockerfile: Dockerfile
    container_name: Nodo2
    environment:
      - DB_HOST=mysql_principal
    ports:
      - "5002:5000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: Balanceador
    ports:
      - "8080:80"
    depends_on:
      - nodo1
      - nodo2

volumes:
  master_data:
  slave_data:

