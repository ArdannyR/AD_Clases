<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Películas</title>
</head>
<body>
    <h1>Registro de Películas</h1>
    
    <div style="background-color: #f0f0f0; padding: 10px; margin-bottom: 20px; border-radius: 5px;">
        <p>Atendido por el contenedor Flask conectado a: <strong>{{ nodo }}</strong></p>
    </div>

    <form action="/agregar" method="POST">
        <input type="text" name="titulo" placeholder="Título" required>
        <input type="text" name="genero" placeholder="Género" required>
        <input type="number" name="anio" placeholder="Año" required>
        <input type="text" name="director" placeholder="Director" required>
        <button type="submit">Guardar</button>
    </form>

    <h2>Películas registradas</h2>

    <ul>
        {% for pelicula in peliculas %}
            <li>
                {{ pelicula.titulo }} - {{ pelicula.genero }} - {{ pelicula.anio }} - {{ pelicula.director }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
