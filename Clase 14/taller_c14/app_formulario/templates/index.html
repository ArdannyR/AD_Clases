<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia Premium</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-hover: #a78bfa;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.15);
        }

        h2 {
            font-weight: 700;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="email"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background-color: #0f172a;
            color: var(--text-primary);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5);
            background: linear-gradient(135deg, var(--accent-hover) 0%, #4f46e5 100%);
        }

        button:active {
            transform: translateY(0);
        }

        .registros {
            margin-top: 40px;
            width: 100%;
            max-width: 480px;
        }

        h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .registro-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            margin-bottom: 10px;
            border-radius: 14px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .registro-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .registro-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .registro-badge {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-hover);
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registro de Asistencia</h2>
        <form method="POST" action="/">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label for="evento">Evento a Asistir</label>
                <select id="evento" name="evento">
                    <option value="Taller MapReduce">Taller MapReduce</option>
                    <option value="Conferencia Docker">Conferencia Docker</option>
                    <option value="Seminario QA">Seminario QA</option>
                </select>
            </div>
            <button type="submit">Registrar Asistencia</button>
        </form>
    </div>
    
    <div class="registros">
        <h3>Últimos 5 Registros</h3>
        {% for reg in registros %}
            <div class="registro-item">
                <span class="registro-name">{{ reg[1] }}</span>
                <span class="registro-badge">{{ reg[3] }}</span>
            </div>
        {% else %}
            <div class="registro-item" style="justify-content: center; color: var(--text-secondary);">
                No hay registros aún.
            </div>
        {% endfor %}
    </div>
</body>
</html>
