version: '3.8'

services:
  apache:   
    image: httpd:latest
    container_name: apache
    ports:
      - 5000:80
  php: 
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - 5001:80
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 5002:80
    networks:
      - red1
    volumes:
      - ./datos:/usr/share/nginx/html
  python:
    build: 
      context: ../Clase 7/docker_file_1
      dockerfile: dockerfile
    container_name: python
    ports:
      - 5003:5000
    networks:
      - red1

networks:
  red1:

volumes:
  datos:


